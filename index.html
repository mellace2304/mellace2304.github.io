                        <th>Missionaries</th>
                    </tr>

    <script>
        var map;

        function buildMap() {
            var areas = [];

            const minMissionaries = 1;
            const maxMissionaries = 168;

            if (AmCharts.maps.indiaDistrictsLow2 && AmCharts.maps.indiaDistrictsLow2.svg && AmCharts.maps.indiaDistrictsLow2.svg.g && AmCharts.maps.indiaDistrictsLow2.svg.g.path) {
                var mapPaths = AmCharts.maps.indiaDistrictsLow2.svg.g.path;

                for (var i = 0; i < mapPaths.length; i++) {
                    var areaId = mapPaths[i].id;
                    if (areaId) {
                        if (missionaryData[areaId]) {
                            let missionaryCount = missionaryData[areaId].missionaries;
                            let normalized = (missionaryCount - minMissionaries) / (maxMissionaries - minMissionaries);
                            normalized = Math.max(0, Math.min(1, normalized));

                            const red = 255;
                            const greenBlue = Math.floor(220 - normalized * 220);
                            const color = `rgb(${red},${greenBlue},${greenBlue})`;

                            areas.push({
                                id: areaId,
                                title: missionaryData[areaId].state + " - " + missionaryData[areaId].district,
                                value: missionaryCount,
                                color: color
                            });
                        } else {
                            areas.push({
                                id: areaId,
                                title: "No Data " + areaId,
                                value: 0,
                                color: "#eeeeee"
                            });
                        }
                    }
                }
            }

            map = AmCharts.makeChart("mapdiv", {
                "type": "map",
                "theme": "light",
                "projection": "mercator",
                "dataProvider": {
                    "map": "indiaDistrictsLow2",
                    "areas": areas
                },
                "areasSettings": {
                    "autoZoom": false,
                    "selectedColor": "#FF9933",
                    "outlineColor": "#666666",
                    "rollOverColor": "#FF6600",
                    "rollOverOutlineColor": "#000000",
                    "balloonText": "<b>[[title]]</b><br><b>Missionaries:</b> [[value]]"
                },
                "export": {
                    "enabled": true
                }
            });
        }

        function searchDistrict() {
            var inputId = document.getElementById('searchBox').value.trim().toUpperCase();
            var area = map.getObjectById(inputId);

            if (area) {
                map.clickMapObject(area);
            } else {
                alert('District ID not found: ' + inputId);
            }
        }

        function populateUnaccountedTable() {
            var tbody = document.getElementById('unaccountedTable').querySelector('tbody');
            var total = 0;

            for (var i = 0; i < unaccountedMissionaries.length; i++) {
                var row = unaccountedMissionaries[i];
                var tr = document.createElement('tr');
                tr.innerHTML = `<td>${row.state}</td><td>${row.district}</td><td>${row.missionaries}</td>`;
                tbody.appendChild(tr);

                total += row.missionaries;
            }

            document.getElementById('unaccountedTotal').textContent = total;
        }

        // Load everything
        buildMap();
        populateUnaccountedTable();
    </script>

            var link = document.createElement('a');

            link.download = 'missionary_allocation_results.csv';
            document.body.appendChild(link);
            link.click();
